name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create test environment file
      run: |
        cat > .env.test << EOF
        NEXTAUTH_URL=http://localhost:3000
        NEXTAUTH_SECRET=test-secret-key-for-ci
        MONGODB_URI=mongodb://root:password@localhost:27017/gitgo-test?authSource=admin
        GITHUB_CLIENT_ID=test-client-id
        GITHUB_CLIENT_SECRET=test-client-secret
        GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY=test-groq-key
        CRON_SECRET=test-cron-secret
        EOF

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run type-check

    - name: Run unit tests
      run: npm test
      env:
        NODE_ENV: test

    - name: Run build test
      run: npm run build
      env:
        NODE_ENV: production

    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://root:password@localhost:27017/gitgo-test?authSource=admin

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Check for vulnerabilities
      run: npx audit-ci --moderate

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Prettier check
      run: npm run format:check

    - name: Run ESLint
      run: npm run lint:strict

    - name: Check bundle size
      run: npm run analyze

  api-tests:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create test environment
      run: |
        cat > .env.test << EOF
        NEXTAUTH_URL=http://localhost:3000
        NEXTAUTH_SECRET=test-secret-key-for-ci
        MONGODB_URI=mongodb://root:password@localhost:27017/gitgo-test?authSource=admin
        GITHUB_CLIENT_ID=test-client-id
        GITHUB_CLIENT_SECRET=test-client-secret
        GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY=test-groq-key
        CRON_SECRET=test-cron-secret
        EOF

    - name: Start application
      run: |
        npm run build
        npm start &
        sleep 30
      env:
        NODE_ENV: test

    - name: Run API tests
      run: npm run test:api
      env:
        NODE_ENV: test
        API_BASE_URL: http://localhost:3000

    - name: Test repository sync endpoint
      run: |
        curl -f -X POST http://localhost:3000/api/cron/sync-repos \
          -H "Authorization: Bearer test-cron-secret" \
          -H "Content-Type: application/json" \
          -d '{"maxRepos": 10}'

  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Create test environment
      run: |
        cat > .env.test << EOF
        NEXTAUTH_URL=http://localhost:3000
        NEXTAUTH_SECRET=test-secret-key-for-ci
        MONGODB_URI=mongodb://root:password@localhost:27017/gitgo-test?authSource=admin
        GITHUB_CLIENT_ID=test-client-id
        GITHUB_CLIENT_SECRET=test-client-secret
        GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY=test-groq-key
        CRON_SECRET=test-cron-secret
        EOF

    - name: Build and start application
      run: |
        npm run build
        npm start &
        sleep 30
      env:
        NODE_ENV: test

    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        NODE_ENV: test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  performance:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Run Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.12.x
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [test, security, code-quality, api-tests, e2e-tests, performance]
    if: always()
    
    steps:
    - name: Notify on success
      if: ${{ needs.test.result == 'success' && needs.security.result == 'success' && needs.code-quality.result == 'success' }}
      run: echo "✅ All tests passed successfully!"

    - name: Notify on failure
      if: ${{ needs.test.result == 'failure' || needs.security.result == 'failure' || needs.code-quality.result == 'failure' }}
      run: |
        echo "❌ Tests failed!"
        exit 1