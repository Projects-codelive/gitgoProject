name: Sync Contributor-Friendly Repositories

on:
  # Run every Sunday at midnight UTC
  schedule:
    - cron: '0 0 * * 0'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      maxRepos:
        description: 'Maximum number of repos to fetch'
        required: false
        default: '10000'
      includeExternal:
        description: 'Include external sources (true/false)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Repository Sync
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.APP_URL }}/api/cron/sync-repos)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "Sync failed with status $http_code"
            exit 1
          fi
          
          echo "Sync completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Repository sync failed. Check the logs above for details."
          # Add notification logic here (Slack, Discord, email, etc.)

# To use this workflow:
# 1. Rename this file to .github/workflows/sync-repos.yml
# 2. Add secrets to your GitHub repository:
#    - CRON_SECRET: Your cron job secret from .env
#    - APP_URL: Your production URL (e.g., https://your-app.vercel.app)
# 3. The workflow will run automatically every Sunday at midnight
# 4. You can also trigger it manually from the Actions tab
